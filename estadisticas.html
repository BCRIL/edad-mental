<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas Globales | Test de Edad Mental</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-container { max-width: 900px; margin: 80px auto 40px; padding: 20px; }
        .stats-title { font-family: var(--font-display); font-size: 36px; text-align: center; margin-bottom: 10px; background: linear-gradient(135deg, var(--clr-primary-light), var(--clr-accent-light)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .stats-subtitle { text-align: center; color: var(--clr-text-muted); margin-bottom: 40px; }
        
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
        
        .chart-card { background: var(--clr-surface); backdrop-filter: blur(20px); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-card); border: 1px solid var(--clr-glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .chart-header { width: 100%; text-align: left; margin-bottom: 20px; font-weight: 700; color: var(--clr-text); }
        .chart-wrapper { width: 100%; position: relative; height: 300px; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo">Edad Mental</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="ranking.html" class="nav-link">Ranking</a>
                <a href="estadisticas.html" class="nav-link" style="color:var(--clr-accent-light)">Estadísticas</a>
            </nav>
        </div>
    </header>

    <main class="stats-container">
        <h1 class="stats-title">Data y Estadísticas</h1>
        <p class="stats-subtitle">¿Cómo se compara la población general?</p>

        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-header">Distribución de Edad Mental Global</div>
                <div class="chart-wrapper">
                    <canvas id="ageChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-header">Rendimiento Medio por Prueba</div>
                <div class="chart-wrapper">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Supabase CDN and Shared DB logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Configuración Global de Chart.js
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'Inter', sans-serif";

            // Default dummy data
            let ageData = [0, 0, 0, 0, 0, 0];
            let radarData = [0, 0, 0, 0, 0];

            // Fetch from database
            const { data, error } = await getStats();
            
            if (!error && data && data.length > 0) {
                // Determine Age Distribution
                // '< 20', '20-25', '26-30', '31-40', '41-50', '51+'
                data.forEach(row => {
                    const a = row.brain_age;
                    if (a < 20) ageData[0]++;
                    else if (a <= 25) ageData[1]++;
                    else if (a <= 30) ageData[2]++;
                    else if (a <= 40) ageData[3]++;
                    else if (a <= 50) ageData[4]++;
                    else ageData[5]++;
                });

                // Calculate Averages for Radar
                let sumR = 0, sumN = 0, sumP = 0, sumM = 0, sumS = 0;
                data.forEach(row => {
                    sumR += row.reaction_score || 0;
                    sumN += row.numbers_score || 0;
                    sumP += row.patterns_score || 0;
                    sumM += row.math_score || 0;
                    sumS += row.sequence_score || 0;
                });
                const count = data.length;
                radarData = [
                    Math.round(sumR / count),
                    Math.round(sumN / count),
                    Math.round(sumP / count),
                    Math.round(sumM / count),
                    Math.round(sumS / count)
                ];
            } else {
                console.warn('No data available, falling back to dummy data', error);
                ageData = [12, 35, 25, 18, 7, 3];
                radarData = [75, 60, 65, 55, 78];
            }

            // Gráfico 1: Distribución
            const ctxAge = document.getElementById('ageChart').getContext('2d');
            new Chart(ctxAge, {
                type: 'bar',
                data: {
                    labels: ['< 20', '20-25', '26-30', '31-40', '41-50', '51+'],
                    datasets: [{
                        label: 'Usuarios',
                        data: ageData,
                        backgroundColor: 'rgba(139, 92, 246, 0.6)',
                        borderColor: 'rgba(139, 92, 246, 1)',
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Gráfico 2: Radar de Pruebas
            const ctxRadar = document.getElementById('radarChart').getContext('2d');
            new Chart(ctxRadar, {
                type: 'radar',
                data: {
                    labels: ['Reacción', 'Memoria Nums.', 'Patrones', 'Mates', 'Secuencia'],
                    datasets: [{
                        label: 'Puntuación Media',
                        data: radarData,
                        backgroundColor: 'rgba(6, 182, 212, 0.2)',
                        borderColor: 'rgba(6, 182, 212, 1)',
                        pointBackgroundColor: 'rgba(6, 182, 212, 1)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#f1f5f9', font: { size: 12 } },
                            ticks: { display: false, max: 100, min: 0 }
                        }
                    },
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        });
    </script>
</body>
</html>
